name: davaistore_mobile
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^2.6.1
  flutter_svg: ^2.2.0
  go_router: ^16.2.1
  salomon_bottom_bar: ^3.3.2
  dio: ^5.9.0
  awesome_dio_interceptor: ^1.3.0
  shared_preferences: ^2.5.3
  slang: ^4.8.1
  slang_flutter: ^4.8.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.1.0
  http: ^1.5.0
  build_runner: ^2.5.4
  freezed: ^3.0.0-0.0.dev
  json_serializable: ^6.7.1
  retrofit: ^4.7.2
  retrofit_generator: 9.7.0
  image_picker: ^1.2.1
  firebase_core: ^4.4.0
  firebase_storage: ^13.0.6
  dart_mappable: ^4.6.1
  dart_mappable_builder: ^4.5.0
  google_nav_bar: ^5.0.7
  auto_route: ^10.2.2
  auto_route_generator: ^10.2.3
  convex_bottom_bar: ^3.2.0
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  logger: ^2.6.2
  firebase_app_check: ^0.4.1+4
  path_provider: ^2.1.5
  flutter_native_splash: ^2.4.7
  google_sign_in: ^6.1.5 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4


flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_davai.png"
  min_sdk_android: 21


flutter_native_splash:
  color: "#ffffff"
  image: assets/images/splash_screen.png
  android: true
  ios: true
